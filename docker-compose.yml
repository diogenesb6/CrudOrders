services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: crudorders-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "CrudOrders@2025"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "CrudOrders@2025" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: CrudOrders.API/Dockerfile
    container_name: crudorders-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=CrudOrdersDb;User Id=sa;Password=CrudOrders@2025;TrustServerCertificate=true;"
    ports:
      - "5234:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crudorders-frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  sqlserver-data:
